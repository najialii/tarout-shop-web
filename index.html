<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tarout Shop</title>
		<link rel="stylesheet" href="/src/style.css" />
	</head>
	<body>
		<header class="topbar">
			<h1>🛍️ Tarout Shop</h1>
			<button id="cart-toggle" class="cart-btn" aria-label="Open cart">
				Cart <span id="cart-count" class="badge">0</span>
			</button>
		</header>

		<main>
			<section id="catalog" class="grid" aria-busy="true">
				<p class="state">Loading products…</p>
			</section>
		</main>

		<aside id="cart-drawer" class="drawer" hidden>
			<div class="drawer-head">
				<h2>Your cart</h2>
				<button id="cart-close" class="icon-btn" aria-label="Close cart">✕</button>
			</div>
			<ul id="cart-items" class="cart-list"></ul>
			<div class="cart-foot">
				<div class="total-row">
					<span>Total</span>
					<strong id="cart-total">$0.00</strong>
				</div>
				<button id="checkout" class="primary" disabled>Checkout</button>
				<p id="checkout-msg" class="state" hidden></p>
			</div>
		</aside>
		<div id="overlay" class="overlay" hidden></div>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
